<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 분석 피드백</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
  --red: #ff4d4d; --red-dim: rgba(255,77,77,0.12);
  --green: #00d084; --green-dim: rgba(0,208,132,0.12);
  --yellow: #ffb800; --yellow-dim: rgba(255,184,0,0.12);
  --blue: #4d9eff; --blue-dim: rgba(77,158,255,0.12);
  --text: #e8eaf0; --text-dim: #8892a4; --text-faint: #4a5568;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  min-height: 100vh; padding: 2rem 1rem 4rem;
}
.header {
  max-width: 900px; margin: 0 auto 2rem;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
  border-bottom: 1px solid var(--border); padding-bottom: 1.2rem;
}
.header h1 { font-size: 1.4rem; font-weight: 800; }
.header h1 span { color: var(--blue); }
.header p { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.3rem; }
.date-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.8rem; color: var(--text-dim); }

.upload-section { max-width: 900px; margin: 0 auto 1.5rem; }

.drop-zone {
  border: 2px dashed var(--border); border-radius: 16px;
  padding: 2.2rem; text-align: center; cursor: pointer;
  transition: all 0.2s; background: var(--surface);
}
.drop-zone:hover { border-color: var(--blue); background: var(--blue-dim); }
.drop-icon { font-size: 2.2rem; margin-bottom: 0.6rem; display: block; }
.drop-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
.drop-sub { font-size: 0.78rem; color: var(--text-dim); }
.drop-tip { font-size: 0.72rem; color: var(--blue); margin-top: 0.5rem; }

.preview-section { display: none; margin-top: 1rem; }
.preview-section.show { display: block; }
.preview-label {
  font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.6rem;
  display: flex; align-items: center; justify-content: space-between;
}
.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.6rem;
}
.preview-item {
  position: relative; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border); background: var(--surface2);
  aspect-ratio: 16/9;
}
.preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.order-badge {
  position: absolute; top: 0.4rem; left: 0.4rem;
  background: rgba(0,0,0,0.75); color: var(--blue);
  border-radius: 6px; padding: 0.15rem 0.5rem;
  font-size: 0.68rem; font-weight: 700;
}
.remove-btn {
  position: absolute; top: 0.3rem; right: 0.3rem;
  background: rgba(0,0,0,0.75); color: var(--text-dim);
  border: none; border-radius: 6px; width: 22px; height: 22px;
  font-size: 0.7rem; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
}
.remove-btn:hover { background: var(--red-dim); color: var(--red); }
.add-more-btn {
  border: 2px dashed var(--border); border-radius: 10px;
  background: transparent; color: var(--text-dim);
  cursor: pointer; font-family: inherit; font-size: 0.78rem;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0.3rem;
  aspect-ratio: 16/9; transition: all 0.2s;
}
.add-more-btn:hover { border-color: var(--blue); color: var(--blue); }

.btn-row { display: flex; align-items: center; gap: 0.8rem; margin-top: 1rem; }
.btn-analyze {
  display: none; align-items: center; gap: 0.5rem;
  background: var(--blue); color: #fff; border: none;
  border-radius: 10px; padding: 0.8rem 2rem;
  font-size: 0.92rem; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
}
.btn-analyze.show { display: flex; }
.btn-analyze:hover { background: #3a8ef0; }
.btn-analyze:disabled { background: var(--surface2); color: var(--text-faint); cursor: not-allowed; }

.loading { display: none; max-width: 900px; margin: 1.5rem auto 0; text-align: center; padding: 2rem; color: var(--text-dim); }
.loading.show { display: block; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

.results { display: none; max-width: 900px; margin: 1.5rem auto 0; flex-direction: column; gap: 1rem; }
.results.show { display: flex; }

.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.section-header { display: flex; align-items: center; gap: 0.7rem; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
.section-icon { font-size: 1.2rem; }
.section-title { font-size: 0.9rem; font-weight: 800; }
.section-count { margin-left: auto; background: var(--surface2); border-radius: 20px; padding: 0.15rem 0.6rem; font-size: 0.72rem; color: var(--text-dim); }
.section-body { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: 0.75rem; }

.card-red .section-header { background: var(--red-dim); border-color: rgba(255,77,77,0.2); }
.card-red .section-title { color: var(--red); }
.card-green .section-header { background: var(--green-dim); border-color: rgba(0,208,132,0.2); }
.card-green .section-title { color: var(--green); }
.card-yellow .section-header { background: var(--yellow-dim); border-color: rgba(255,184,0,0.2); }
.card-yellow .section-title { color: var(--yellow); }

.item { background: var(--surface2); border-radius: 10px; padding: 0.85rem 1rem; border-left: 3px solid transparent; }
.item-red { border-color: var(--red); }
.item-green { border-color: var(--green); }
.item-yellow { border-color: var(--yellow); }
.item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.3rem; }
.item-name { font-size: 0.9rem; font-weight: 800; }
.item-stats { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.stat-pill { font-size: 0.7rem; padding: 0.15rem 0.55rem; border-radius: 20px; font-weight: 700; }
.stat-red { background: var(--red-dim); color: var(--red); }
.stat-green { background: var(--green-dim); color: var(--green); }
.item-action { font-size: 0.8rem; color: var(--text-dim); line-height: 1.8; }
.item-action strong { color: var(--text); }
.item-season { font-size: 0.78rem; color: var(--yellow); margin-top: 0.3rem; }

.summary-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.2rem; display: flex; gap: 2rem; flex-wrap: wrap; }
.summary-item { display: flex; flex-direction: column; gap: 0.2rem; }
.summary-label { font-size: 0.68rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.summary-value { font-size: 1rem; font-weight: 800; }

.error-msg { display: none; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.82rem; color: var(--red); max-width: 900px; margin: 1rem auto 0; }
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>매출 <span>분석 피드백</span></h1>
    <p>현황판을 여러 장 캡처해서 올리면 AI가 합쳐서 분석합니다</p>
  </div>
  <div class="date-badge" id="today-date"></div>
</div>

<div class="upload-section">
  <input type="file" id="file-input" accept="image/*" multiple style="display:none">
  <div class="drop-zone" id="drop-zone">
    <span class="drop-icon">📊</span>
    <div class="drop-title">매출 현황판 이미지를 올려주세요</div>
    <div class="drop-sub">클릭하거나 드래그 &amp; 드롭 · PNG, JPG, 스크린샷 모두 가능</div>
    <div class="drop-tip">✨ 여러 장 동시 선택 가능 — AI가 하나의 현황판으로 합쳐서 분석해요</div>
  </div>
  <div class="preview-section" id="preview-section">
    <div class="preview-label">
      <span>업로드된 이미지 <span id="img-count">0</span>장</span>
    </div>
    <div class="preview-grid" id="preview-grid"></div>
  </div>
  <div class="btn-row">
    <button class="btn-analyze" id="analyze-btn">⚡ AI 분석 시작</button>
  </div>
</div>

<div class="error-msg" id="error-msg"></div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>이미지를 분석 중이에요...</p>
</div>
<div class="results" id="results"></div>

<script>
(function() {
  var images = [];

  var now = new Date();
  document.getElementById('today-date').textContent =
    now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');

  var fileInput = document.getElementById('file-input');
  var dropZone  = document.getElementById('drop-zone');
  var analyzeBtn = document.getElementById('analyze-btn');

  dropZone.addEventListener('click', function() {
    fileInput.click();
  });

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files && fileInput.files.length > 0) {
      addFiles(fileInput.files);
    }
    fileInput.value = '';
  });

  analyzeBtn.addEventListener('click', function() {
    analyze();
  });

  function addFiles(files) {
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      if (!file.type.startsWith('image/')) continue;
      (function(f) {
        var reader = new FileReader();
        reader.onload = function(e) {
          images.push({ base64: e.target.result.split(',')[1], type: f.type, src: e.target.result });
          renderPreviews();
        };
        reader.readAsDataURL(f);
      })(file);
    }
  }

  function removeImage(idx) {
    images.splice(idx, 1);
    renderPreviews();
  }
  window.removeImage = removeImage;

  function renderPreviews() {
    var grid    = document.getElementById('preview-grid');
    var section = document.getElementById('preview-section');
    var countEl = document.getElementById('img-count');

    if (images.length === 0) {
      section.classList.remove('show');
      analyzeBtn.classList.remove('show');
      dropZone.style.display = 'block';
      return;
    }

    dropZone.style.display = 'none';
    section.classList.add('show');
    analyzeBtn.classList.add('show');
    countEl.textContent = images.length;

    var html = '';
    for (var i = 0; i < images.length; i++) {
      html += '<div class="preview-item">';
      html += '<img src="' + images[i].src + '">';
      html += '<span class="order-badge">' + (i+1) + '</span>';
      html += '<button class="remove-btn" onclick="removeImage(' + i + ')">✕</button>';
      html += '</div>';
    }
    html += '<button class="add-more-btn" onclick="document.getElementById(\'file-input\').click()"><span style="font-size:1.3rem">+</span><span>추가</span></button>';
    grid.innerHTML = html;
  }

  function getSeasonContext() {
    var now = new Date();
    var m = now.getMonth() + 1;
    var d = now.getDate();
    // 3월 1~15일: 입학 직전, 신학기 준비 피크
    if (m === 3 && d <= 15) return '현재 시즌(3월 초~중순): 입학 직전 신학기 준비 피크. 봄 신상, 운동화, 책가방, 학용품, 아동 캐주얼 수요 최고조.';
    // 3월 16일~31일: 입학식 이미 지남, 일상 복귀
    if (m === 3 && d >= 16) return '현재 시즌(3월 중순 이후): 입학식 이미 완료. 신학기 수요 마무리 단계. 봄 신상/아우터 본격 수요로 전환. 어린이날 선물 얼리버드 시작.';
    if (m === 4) return '현재 시즌(4월): 봄 시즌 본격화. 봄 신상, 아우터, 운동화, 어린이날(5/5) 선물 준비 수요 상승.';
    if (m >= 5 && m <= 6) return '현재 시즌(5~6월): 어린이날/가정의달. 선물세트, 완구, 아웃도어, 샌들/크록스류 수요 상승.';
    if (m >= 7 && m <= 8) return '현재 시즌(7~8월): 여름방학. 수영복, 샌들, 여름캐주얼, 여행/레저 아이템 피크.';
    if (m >= 9 && m <= 10) return '현재 시즌(9~10월): 개학/추석. 가을 신상, 아우터 얼리버드, 운동화 재상승.';
    return '현재 시즌(11~2월): 방한/겨울. 패딩, 부츠, 기모 이너웨어, 크리스마스 선물세트.';
  }

  function buildPrompt() {
    var season = getSeasonContext();
    var lines = [
      '당신은 이랜드 플랫폼 매출 분석 전문가입니다. 플랫폼 총 책임자에게 즉각 실행 가능한 인사이트를 제공하세요.',
      '',
      '[플랫폼 비즈니스 컨텍스트]',
      '- 이랜드몰: 이랜드 자체 브랜드 중심(스파오, 미쏘, 로엠 등) 자사몰 성격. 외부 브랜드 비중 낮음. 제도권/디자이너 카테고리 개념 없음',
      '- 키디키디: 키즈 전문 플랫폼. 대부분 외부 아동 브랜드 입점. 하위 모든 카테고리는 아동 카테고리임',
      '- 제도권패션(키디키디 전용): 백화점 입점 등 인지도 높은 기성 아동 패션 브랜드. 안정적 수요 기반. 교복/학교체육복 판매 안함. 절대 교복/체육복 관련 해석 금지',
      '- 디자이너(키디키디 전용): SNS 기반 신진/트렌디 아동 브랜드. 트렌드 민감, 변동성 큼. 제도권패션과 고객층 달라 대안 분리 접근',
      '- 이랜드글로벌: 법인명. 실제로는 의류CU아동 + 성인PB를 합친 카테고리. 분석 시 이 두 카테고리의 합산으로 해석할 것',
      '- 팜앤푸드: 온라인 마트 성격. 식재료 위주. 패션/의류 카테고리와 완전히 다른 구매 패턴. 식품 시즌성(명절/계절 식재료 등)으로 해석할 것',
      '- MK_무누핀핀: 2월부터 본격 재런칭. 낮은 수치는 정상, 성장 궤도 진입 여부 관점으로 해석',
      '- 무형 카테고리: 종료된 카테고리. 분석 완전 제외',
      '- 여행 카테고리: 지난달 재개 초기. 낮은 수치 정상, 성장 가능성 관점으로만 해석',
      '- ' + season,
      '',
      '위 ' + images.length + '장의 이미지는 하나의 매출 현황판을 여러 부분으로 나눠 캡처한 것입니다. 순서 무관하게 통합해서 분석하세요.',
      '',
      '반드시 아래 JSON 형식으로만 응답하세요. JSON 외 텍스트는 절대 출력하지 마세요.',
      '',
      '{"summary":{"total_achievement":"전체 누적 달성율","total_growth":"전체 성장율","key_message":"오늘 핵심 메시지 20자 이내"},"red_alerts":[{"name":"카테고리명","achievement":"달성율","growth":"성장율","reason":"문제 원인 20자 이내","action":"즉시 실행 액션 35자 이내","season_tip":"지금 시즌 밀어야 할 아이템 30자 이내"}],"alternatives":[{"title":"대안 제목 12자 이내","description":"실행 방안 50자 이내"}],"growth_picks":[{"name":"카테고리명","achievement":"달성율","growth":"성장율","reason":"성장 이유 20자 이내","action":"드라이브 액션 35자 이내","season_tip":"지금 시즌 밀어야 할 아이템 30자 이내"}]}',
      '',
      '분석 기준:',
      '- red_alerts: 달성율 낮거나 성장율 -20% 이하 상위 5개 (무형/여행 제외, 심각한 순)',
      '- alternatives: 데이터와 시즌을 결합한 3가지 핵심 실행 대안 (구체적 아이템/방법 명시)',
      '- growth_picks: 달성율 95% 이상 OR 성장율 플러스 상위 4개'
    ];
    return lines.join('\n');
  }

  async function analyze() {
    if (images.length === 0) { showError('이미지를 먼저 업로드해주세요.'); return; }

    analyzeBtn.disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('results').classList.remove('show');
    document.getElementById('error-msg').classList.remove('show');

    var content = [];
    for (var i = 0; i < images.length; i++) {
      content.push({ type: 'image', source: { type: 'base64', media_type: images[i].type, data: images[i].base64 } });
      content.push({ type: 'text', text: '[이미지 ' + (i+1) + '/' + images.length + ']' });
    }
    content.push({ type: 'text', text: buildPrompt() });

    try {
      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          messages: [{ role: 'user', content: content }]
        })
      });
      var data = await res.json();
      if (data.error) throw new Error(data.error.message);
      var text = '';
      for (var j = 0; j < data.content.length; j++) {
        if (data.content[j].text) text += data.content[j].text;
      }
      var start = text.indexOf('{');
      var end   = text.lastIndexOf('}');
      var result = JSON.parse(text.substring(start, end + 1));
      renderResults(result);
    } catch(e) {
      showError('분석 오류: ' + e.message);
    } finally {
      analyzeBtn.disabled = false;
      document.getElementById('loading').classList.remove('show');
    }
  }

  function renderResults(r) {
    var html = '';

    // Summary
    html += '<div class="summary-bar">';
    html += '<div class="summary-item"><div class="summary-label">핵심 메시지</div><div class="summary-value" style="color:var(--blue);font-size:0.88rem">' + esc(r.summary.key_message) + '</div></div>';
    html += '<div class="summary-item"><div class="summary-label">전체 달성율</div><div class="summary-value">' + esc(r.summary.total_achievement) + '</div></div>';
    var gc = (r.summary.total_growth || '').indexOf('-') === 0 ? 'var(--red)' : 'var(--green)';
    html += '<div class="summary-item"><div class="summary-label">전년비</div><div class="summary-value" style="color:' + gc + '">' + esc(r.summary.total_growth) + '</div></div>';
    html += '<div class="summary-item"><div class="summary-label">위험</div><div class="summary-value" style="color:var(--red)">' + r.red_alerts.length + '개</div></div>';
    html += '<div class="summary-item"><div class="summary-label">성장</div><div class="summary-value" style="color:var(--green)">' + r.growth_picks.length + '개</div></div>';
    html += '</div>';

    // Red alerts
    html += '<div class="section-card card-red" style="animation-delay:0.1s">';
    html += '<div class="section-header"><span class="section-icon">🔴</span><span class="section-title">빨간불 카테고리</span><span class="section-count">' + r.red_alerts.length + '개</span></div>';
    html += '<div class="section-body">';
    for (var i = 0; i < r.red_alerts.length; i++) {
      var it = r.red_alerts[i];
      var neg = (it.growth || '').indexOf('-') !== -1;
      html += '<div class="item item-red">';
      html += '<div class="item-top"><span class="item-name">' + esc(it.name) + '</span>';
      html += '<div class="item-stats">';
      html += '<span class="stat-pill stat-red">달성 ' + esc(it.achievement) + '</span>';
      html += '<span class="stat-pill ' + (neg ? 'stat-red' : 'stat-green') + '">YoY ' + esc(it.growth) + '</span>';
      html += '</div></div>';
      html += '<div class="item-action">⚠️ <strong>' + esc(it.reason) + '</strong><br>' + esc(it.action) + '</div>';
      if (it.season_tip) html += '<div class="item-season">🗓️ ' + esc(it.season_tip) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';

    // Alternatives
    html += '<div class="section-card card-yellow" style="animation-delay:0.2s">';
    html += '<div class="section-header"><span class="section-icon">💡</span><span class="section-title">핵심 대안</span><span class="section-count">' + r.alternatives.length + '개</span></div>';
    html += '<div class="section-body">';
    for (var i = 0; i < r.alternatives.length; i++) {
      var it = r.alternatives[i];
      html += '<div class="item item-yellow">';
      html += '<div class="item-top"><span class="item-name">' + (i+1) + '. ' + esc(it.title) + '</span></div>';
      html += '<div class="item-action">' + esc(it.description) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';

    // Growth picks
    html += '<div class="section-card card-green" style="animation-delay:0.3s">';
    html += '<div class="section-header"><span class="section-icon">🚀</span><span class="section-title">밀어줄 카테고리</span><span class="section-count">' + r.growth_picks.length + '개</span></div>';
    html += '<div class="section-body">';
    for (var i = 0; i < r.growth_picks.length; i++) {
      var it = r.growth_picks[i];
      html += '<div class="item item-green">';
      html += '<div class="item-top"><span class="item-name">' + esc(it.name) + '</span>';
      html += '<div class="item-stats">';
      html += '<span class="stat-pill stat-green">달성 ' + esc(it.achievement) + '</span>';
      html += '<span class="stat-pill stat-green">YoY ' + esc(it.growth) + '</span>';
      html += '</div></div>';
      html += '<div class="item-action">✅ <strong>' + esc(it.reason) + '</strong><br>' + esc(it.action) + '</div>';
      if (it.season_tip) html += '<div class="item-season">🗓️ ' + esc(it.season_tip) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';

    var el = document.getElementById('results');
    el.innerHTML = html;
    el.classList.add('show');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

})();
</script>
</body>
</html>
